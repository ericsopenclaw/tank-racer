<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tank Racer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0f0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    user-select: none;
  }
  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    cursor: crosshair;
  }
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    font-size: 14px;
    pointer-events: none;
    z-index: 10;
  }
  #hud .label { color: #aaa; font-size: 11px; }
  #hud .value { font-size: 18px; font-weight: bold; }
  #progressBar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: #333;
    pointer-events: none;
    z-index: 10;
  }
  #progressFill {
    height: 100%;
    background: linear-gradient(90deg, #0f0, #ff0);
    width: 0%;
    transition: width 0.1s;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    color: #fff;
  }
  #overlay h1 {
    font-size: clamp(28px, 6vw, 52px);
    color: #ff0;
    text-shadow: 0 0 20px #ff0;
    margin-bottom: 10px;
  }
  #overlay .subtitle { color: #aaa; font-size: 14px; margin-bottom: 30px; }
  #overlay .instructions { color: #ccc; font-size: 13px; line-height: 1.8; text-align: center; margin-bottom: 30px; }
  #overlay button {
    background: #ff0;
    color: #000;
    border: none;
    padding: 14px 40px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
  }
  #overlay button:hover { background: #ffa; }
  .hidden { display: none !important; }
  #lapDisplay { color: #ff0; font-size: 14px; }
  #speedGauge {
    display: flex; flex-direction: column; align-items: center;
  }
  #speedBar {
    width: 80px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 4px;
  }
  #speedFill { height: 100%; background: #0f8; width: 0%; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="hud" class="hidden">
  <div>
    <div class="label">TIME</div>
    <div class="value" id="timeDisplay">0.00</div>
  </div>
  <div id="speedGauge">
    <div class="label">SPEED</div>
    <div id="speedBar"><div id="speedFill"></div></div>
  </div>
  <div>
    <div class="label">LAP</div>
    <div class="value" id="lapDisplay">1 / 3</div>
  </div>
</div>
<div id="progressBar" class="hidden"><div id="progressFill"></div></div>
<div id="overlay">
  <h1>🎯 TANK RACER</h1>
  <div class="subtitle">Race + Shoot = Win!</div>
  <div class="instructions">
    🕹️ Arrow Keys / WASD — Drive &amp; Aim<br>
    Space / Z — Fire<br>
    📱 Drag anywhere — Joystick move<br>
    Tap / Click — Shoot<br><br>
    Shoot obstacles, avoid mines, finish 3 laps!
  </div>
  <button onclick="startGame()">START RACE</button>
</div>

<script>
// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = Math.min(window.innerWidth, 800);
  H = canvas.height = Math.min(window.innerHeight, 600);
}
resize();
window.addEventListener('resize', resize);

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  if (type === 'shoot') {
    o.type = 'square';
    o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(80, t + 0.1);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.start(t); o.stop(t + 0.1);
  } else if (type === 'explode') {
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(120, t);
    o.frequency.exponentialRampToValueAtTime(20, t + 0.3);
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.start(t); o.stop(t + 0.3);
  } else if (type === 'hit') {
    o.type = 'triangle';
    o.frequency.setValueAtTime(300, t);
    o.frequency.exponentialRampToValueAtTime(100, t + 0.2);
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.start(t); o.stop(t + 0.2);
  } else if (type === 'win') {
    [0, 0.15, 0.3, 0.45].forEach(delay => {
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.connect(g2); g2.connect(audioCtx.destination);
      o2.type = 'triangle';
      o2.frequency.setValueAtTime(440 + delay * 400, t + delay);
      g2.gain.setValueAtTime(0.2, t + delay);
      g2.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.2);
      o2.start(t + delay); o2.stop(t + delay + 0.2);
    });
  }
}

// ─── GAME CONSTANTS ───────────────────────────────────────────────────────────
const TRACK_LENGTH = 8000; // pixels
const TOTAL_LAPS = 3;
const LANE_COUNT = 3;
const LANE_WIDTH = 60;

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let state = 'menu'; // menu | playing | finished
let scrollX = 0;
let time = 0;
let lap = 1;
let startTime = 0;
let finishTime = 0;
let highScore = parseFloat(localStorage.getItem('tankRacerBest') || '0');

// ─── PARTICLES ────────────────────────────────────────────────────────────────
const particles = [];
function spawnParticles(x, y, color, count = 10, speed = 4) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * speed + 0.5;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 1, decay: Math.random() * 0.04 + 0.02,
      size: Math.random() * 5 + 1, color
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── TANK ────────────────────────────────────────────────────────────────────
const tank = {
  x: 200, y: 0,
  vx: 0, vy: 0,
  speed: 0,
  angle: 0,     // movement angle
  turretAngle: -Math.PI / 2,
  w: 36, h: 48,
  lane: 1,       // 0, 1, 2 (middle)
  hp: 3,
  invincible: 0,
  shootCooldown: 0,
  trackX: 0      // distance traveled on track
};

function resetTank() {
  tank.x = W * 0.25;
  tank.y = H / 2;
  tank.vx = 0; tank.vy = 0;
  tank.speed = 0;
  tank.angle = 0;
  tank.turretAngle = -Math.PI / 2;
  tank.lane = 1;
  tank.hp = 3;
  tank.invincible = 0;
  tank.shootCooldown = 0;
  tank.trackX = 0;
}

function getLaneY(lane) {
  return H / 2 + (lane - 1) * LANE_WIDTH;
}

function drawTank() {
  const x = tank.x, y = tank.y;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tank.angle);

  // Tank body shadow
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#4a2';

  // Tracks
  ctx.fillStyle = '#333';
  ctx.fillRect(-tank.w / 2, -tank.h / 2, 6, tank.h);
  ctx.fillRect(tank.w / 2 - 6, -tank.h / 2, 6, tank.h);

  // Body
  ctx.fillStyle = '#3a7a22';
  ctx.fillRect(-tank.w / 2 + 6, -tank.h / 2 + 4, tank.w - 12, tank.h - 8);

  // Turret base
  ctx.fillStyle = '#2d6018';
  ctx.beginPath();
  ctx.arc(0, 0, 12, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Draw turret separately (rotates toward mouse)
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tank.turretAngle);
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#5a3';
  ctx.fillStyle = '#4a8a2a';
  ctx.fillRect(-4, -28, 8, 28);
  ctx.fillStyle = '#6aaa3a';
  ctx.fillRect(-5, -28, 10, 6);
  ctx.restore();

  // Invincibility flash
  if (tank.invincible > 0 && Math.floor(tank.invincible / 5) % 2 === 0) {
    ctx.save();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#fff';
    ctx.beginPath();
    ctx.arc(tank.x, tank.y, 30, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ─── BULLETS ──────────────────────────────────────────────────────────────────
const bullets = [];
const enemyBullets = [];

function shootBullet() {
  if (tank.shootCooldown > 0) return;
  const bx = tank.x + Math.cos(tank.turretAngle) * 30;
  const by = tank.y + Math.sin(tank.turretAngle) * 30;
  bullets.push({
    x: bx, y: by,
    vx: Math.cos(tank.turretAngle) * 14,
    vy: Math.sin(tank.turretAngle) * 14,
    w: 6, h: 10,
    dist: 0
  });
  tank.shootCooldown = 12;
  playSound('shoot');
}

function drawBullets() {
  ctx.save();
  for (const b of bullets) {
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff0';
    ctx.fillStyle = '#ff0';
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(Math.atan2(b.vy, b.vx) + Math.PI / 2);
    ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
    ctx.restore();
  }
  for (const b of enemyBullets) {
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#f44';
    ctx.fillStyle = '#f44';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ─── OBSTACLES ────────────────────────────────────────────────────────────────
const obstacles = [];
const OBSTACLE_TYPES = {
  barrel: { w: 24, h: 24, color: '#c50', glow: '#f80', hp: 2, pts: 50 },
  mine: { w: 28, h: 28, color: '#333', glow: '#f00', hp: 1, pts: 20 },
  barricade: { w: 50, h: 20, color: '#654', glow: '#a80', hp: 3, pts: 80 },
  truck: { w: 40, h: 55, color: '#446', glow: '#08f', hp: 4, pts: 120 },
};

function spawnObstacle(trackX) {
  const types = ['barrel', 'mine', 'barricade', 'truck'];
  const weights = [0.3, 0.3, 0.25, 0.15];
  let r = Math.random(), chosen = types[0];
  for (let i = 0; i < types.length; i++) {
    r -= (weights[i] || 0.1);
    if (r <= 0) { chosen = types[i]; break; }
  }
  const t = OBSTACLE_TYPES[chosen];
  const lane = Math.floor(Math.random() * LANE_COUNT);
  obstacles.push({
    type: chosen,
    trackX,
    lane,
    x: 0, y: 0,
    w: t.w, h: t.h,
    hp: t.hp, maxHp: t.hp,
    color: t.color, glow: t.glow,
    pts: t.pts,
    alive: true,
    hitFlash: 0
  });
}

let nextObstacleX = 400;

function updateObstacles() {
  // Generate new obstacles ahead
  while (nextObstacleX < tank.trackX + W + 500) {
    spawnObstacle(nextObstacleX);
    nextObstacleX += 200 + Math.random() * 300;
  }

  // Remove obstacles far behind
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.x = o.trackX - tank.trackX + tank.x;
    o.y = getLaneY(o.lane);
    if (o.hitFlash > 0) o.hitFlash--;
    if (o.trackX < tank.trackX - 200) obstacles.splice(i, 1);
  }
}

function drawObstacles() {
  for (const o of obstacles) {
    const sx = o.x;
    const sy = o.y;
    if (sx < -60 || sx > W + 60) continue;
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = o.glow;
    ctx.fillStyle = o.hitFlash > 0 ? '#fff' : o.color;

    if (o.type === 'mine') {
      // Spiky mine
      ctx.beginPath();
      const pts = 8;
      for (let i = 0; i < pts; i++) {
        const a = (Math.PI * 2 * i) / pts;
        const r = i % 2 === 0 ? o.w / 2 : o.w / 4;
        const px = sx + Math.cos(a) * r;
        const py = sy + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#f00';
      ctx.beginPath();
      ctx.arc(sx, sy, 4, 0, Math.PI * 2);
      ctx.fill();
    } else if (o.type === 'truck') {
      ctx.fillRect(sx - o.w / 2, sy - o.h / 2, o.w, o.h);
      ctx.fillStyle = '#224';
      ctx.fillRect(sx - o.w / 2 + 4, sy - o.h / 2 + 4, o.w - 8, 12);
    } else {
      ctx.fillRect(sx - o.w / 2, sy - o.h / 2, o.w, o.h);
    }

    if (o.maxHp > 1) {
      const pct = o.hp / o.maxHp;
      ctx.fillStyle = '#333';
      ctx.fillRect(sx - o.w / 2, sy - o.h / 2 - 8, o.w, 4);
      ctx.fillStyle = pct > 0.5 ? '#0f0' : '#f00';
      ctx.fillRect(sx - o.w / 2, sy - o.h / 2 - 8, o.w * pct, 4);
    }
    ctx.restore();
  }
}

// ─── ENEMY TANKS ─────────────────────────────────────────────────────────────
const enemyTanks = [];

function spawnEnemyTank(trackX) {
  enemyTanks.push({
    trackX,
    lane: Math.floor(Math.random() * LANE_COUNT),
    speed: 1.5 + Math.random() * 2,
    hp: 2,
    alive: true,
    shootTimer: Math.random() * 60 + 30,
    w: 30, h: 40,
    x: 0, y: 0,
    hitFlash: 0
  });
}

let nextEnemyX = 600;

function updateEnemyTanks() {
  while (nextEnemyX < tank.trackX + W + 500) {
    spawnEnemyTank(nextEnemyX);
    nextEnemyX += 400 + Math.random() * 500;
  }

  for (let i = enemyTanks.length - 1; i >= 0; i--) {
    const e = enemyTanks[i];
    e.trackX += e.speed;
    e.x = e.trackX - tank.trackX + tank.x;
    e.y = getLaneY(e.lane);

    // Enemy shoots backward occasionally
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.x > 0 && e.x < W) {
      enemyBullets.push({ x: e.x, y: e.y, vx: -4 - Math.random() * 2, vy: (Math.random() - 0.5) * 2 });
      e.shootTimer = 80 + Math.random() * 80;
    }

    if (e.hitFlash > 0) e.hitFlash--;
    if (e.trackX < tank.trackX - 200) enemyTanks.splice(i, 1);
  }
}

function drawEnemyTanks() {
  for (const e of enemyTanks) {
    if (e.x < -60 || e.x > W + 60) continue;
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(Math.PI / 2); // facing left (toward player)
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#f44';
    ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#882222';
    ctx.fillRect(-e.w / 2, -e.h / 2, e.w, e.h);
    ctx.fillStyle = '#aa3333';
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── COLLISION ────────────────────────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return Math.abs(ax - bx) < (aw + bw) / 2 && Math.abs(ay - by) < (ah + bh) / 2;
}

function checkCollisions() {
  // Bullets vs obstacles
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    let hit = false;
    for (const o of obstacles) {
      if (rectsOverlap(b.x, b.y, b.w, b.h, o.x, o.y, o.w, o.h)) {
        o.hp--;
        o.hitFlash = 6;
        hit = true;
        spawnParticles(b.x, b.y, '#ff0', 4, 3);
        if (o.hp <= 0) {
          spawnParticles(o.x, o.y, o.glow, 15, 5);
          playSound('explode');
          score += o.pts;
          o.alive = false;
        }
        break;
      }
    }
    // Bullets vs enemy tanks
    if (!hit) {
      for (const e of enemyTanks) {
        if (rectsOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
          e.hp--;
          e.hitFlash = 8;
          hit = true;
          spawnParticles(b.x, b.y, '#f44', 5, 3);
          if (e.hp <= 0) {
            spawnParticles(e.x, e.y, '#f44', 20, 6);
            playSound('explode');
            score += 200;
            e.alive = false;
          }
          break;
        }
      }
    }
    if (hit) { bullets.splice(bi, 1); continue; }
    b.dist += Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (b.dist > 400 || b.x < -10 || b.x > W + 10 || b.y < -10 || b.y > H + 10) {
      bullets.splice(bi, 1);
    }
  }

  // Enemy bullets vs tank
  if (tank.invincible <= 0) {
    for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
      const b = enemyBullets[bi];
      if (rectsOverlap(b.x, b.y, 10, 10, tank.x, tank.y, tank.w, tank.h)) {
        enemyBullets.splice(bi, 1);
        hitTank();
      }
      if (b.x < -10 || b.x > W + 10) enemyBullets.splice(bi, 1);
    }
  }

  // Obstacles vs tank
  if (tank.invincible <= 0) {
    for (const o of obstacles) {
      if (rectsOverlap(tank.x, tank.y, tank.w * 0.8, tank.h * 0.8, o.x, o.y, o.w * 0.8, o.h * 0.8)) {
        spawnParticles(o.x, o.y, o.glow, 10, 4);
        o.hp -= 2;
        if (o.hp <= 0) { o.alive = false; spawnParticles(o.x, o.y, o.glow, 15, 5); }
        hitTank();
        break;
      }
    }
  }

  // Enemy tanks vs tank (collision damage)
  if (tank.invincible <= 0) {
    for (const e of enemyTanks) {
      if (rectsOverlap(tank.x, tank.y, tank.w * 0.7, tank.h * 0.7, e.x, e.y, e.w * 0.7, e.h * 0.7)) {
        spawnParticles(e.x, e.y, '#f44', 15, 5);
        hitTank();
        break;
      }
    }
  }

  // Clean up dead obstacles/enemies
  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (!obstacles[i].alive) obstacles.splice(i, 1);
  }
  for (let i = enemyTanks.length - 1; i >= 0; i--) {
    if (!enemyTanks[i].alive) enemyTanks.splice(i, 1);
  }
}

let score = 0;
let screenShake = 0;

function hitTank() {
  tank.hp--;
  tank.invincible = 90;
  screenShake = 12;
  playSound('hit');
  spawnParticles(tank.x, tank.y, '#f44', 15, 4);
  if (tank.hp <= 0) {
    setTimeout(() => {
      state = 'finished';
      playSound('explode');
      if (finishTime < highScore || highScore === 0) {
        highScore = finishTime;
        localStorage.setItem('tankRacerBest', highScore);
      }
    }, 500);
  }
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = {};
let mouseX = 0, mouseY = 0;
let touchMoveActive = false;
let touchMoveId = null;
let touchMoveOrigin = { x: 0, y: 0 };
let touchShootActive = false;

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'KeyZ') {
    if (state === 'playing') shootBullet();
    if (state === 'menu' || state === 'finished') startGame();
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', e => {
  initAudio();
  if (state === 'menu' || state === 'finished') { startGame(); return; }
  if (state === 'playing') shootBullet();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  if (state === 'menu' || state === 'finished') { startGame(); return; }
  for (const t of e.changedTouches) {
    if (!touchMoveActive) {
      touchMoveActive = true;
      touchMoveId = t.identifier;
      touchMoveOrigin.x = t.clientX;
      touchMoveOrigin.y = t.clientY;
    } else {
      touchShootActive = true;
      shootBullet();
    }
  }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
}, {passive: false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchMoveActive = false;
  touchShootActive = false;
}, {passive: false});

// ─── TRACK DRAWING ────────────────────────────────────────────────────────────
function drawTrack() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#1a2a1a');
  skyGrad.addColorStop(1, '#0a150a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Ground (scrolling)
  const groundY = H / 2 - (LANE_COUNT * LANE_WIDTH) / 2 - 20;
  const groundH = LANE_COUNT * LANE_WIDTH + 40;
  ctx.fillStyle = '#2a2a1a';
  ctx.fillRect(0, groundY, W, groundH);

  // Lane dividers (scrolling with perspective lines)
  const offset = tank.trackX % 80;
  ctx.strokeStyle = '#4a4a2a';
  ctx.lineWidth = 2;
  ctx.setLineDash([30, 20]);
  ctx.lineDashOffset = -offset;
  for (let i = 0; i <= LANE_COUNT; i++) {
    const y = getLaneY(i - 0.5);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Road edges
  ctx.strokeStyle = '#ff0';
  ctx.lineWidth = 3;
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#ff0';
  for (const side of [-1, 1]) {
    const y = getLaneY(side * (LANE_COUNT / 2 + 0.5 - 0.5));
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // Distance markers
  const markerOffset = tank.trackX % 500;
  for (let mx = 500 - markerOffset; mx < W; mx += 500) {
    const dist = Math.floor((tank.trackX + mx) / 100);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(mx, groundY, 2, groundH);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(dist + 'm', mx, groundY - 4);
  }

  // Checkered finish line
  const finishScreenX = TRACK_LENGTH - tank.trackX + tank.x;
  if (finishScreenX > -50 && finishScreenX < W + 50) {
    const fw = 20;
    ctx.save();
    ctx.translate(finishScreenX, groundY);
    for (let row = 0; row < Math.ceil(groundH / fw); row++) {
      for (let col = 0; col < 2; col++) {
        ctx.fillStyle = (row + col) % 2 === 0 ? '#fff' : '#000';
        ctx.fillRect(col * fw / 2, row * fw, fw / 2, fw);
      }
    }
    ctx.restore();
  }

  // Lap indicator arrows on track
  for (let lapMarker = 1; lapMarker < TOTAL_LAPS; lapMarker++) {
    const lx = (TRACK_LENGTH / TOTAL_LAPS) * lapMarker - tank.trackX + tank.x;
    if (lx > -20 && lx < W + 20) {
      ctx.save();
      ctx.fillStyle = 'rgba(255,200,0,0.2)';
      ctx.fillRect(lx - 2, groundY, 4, groundH);
      ctx.restore();
    }
  }
}

// ─── HUD UPDATE ──────────────────────────────────────────────────────────────
function updateHUD() {
  const elapsed = finishTime > 0 ? finishTime : ((Date.now() - startTime) / 1000);
  document.getElementById('timeDisplay').textContent = elapsed.toFixed(2) + 's';
  const speedPct = Math.min(100, tank.speed / 12 * 100);
  document.getElementById('speedFill').style.width = speedPct + '%';
  document.getElementById('lapDisplay').textContent = lap + ' / ' + TOTAL_LAPS;
  const prog = Math.min(100, tank.trackX / TRACK_LENGTH * 100);
  document.getElementById('progressFill').style.width = prog + '%';
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function startGame() {
  state = 'playing';
  score = 0;
  lap = 1;
  scrollX = 0;
  finishTime = 0;
  resetTank();
  obstacles.length = 0;
  enemyTanks.length = 0;
  bullets.length = 0;
  enemyBullets.length = 0;
  particles.length = 0;
  nextObstacleX = 400;
  nextEnemyX = 600;
  startTime = Date.now();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('progressBar').classList.remove('hidden');
}

function checkLapProgress() {
  const lapDist = TRACK_LENGTH / TOTAL_LAPS;
  const newLap = Math.floor(tank.trackX / lapDist) + 1;
  if (newLap > lap && newLap <= TOTAL_LAPS) {
    lap = newLap;
    spawnParticles(tank.x, tank.y, '#ff0', 20, 6);
  }
  if (tank.trackX >= TRACK_LENGTH) {
    finishTime = (Date.now() - startTime) / 1000;
    state = 'finished';
    playSound('win');
    if (finishTime < highScore || highScore === 0) {
      highScore = finishTime;
      localStorage.setItem('tankRacerBest', highScore);
    }
    showFinish();
  }
}

function showFinish() {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>🏁 FINISHED!</h1>
    <div class="subtitle">Lap ${lap} / ${TOTAL_LAPS} &nbsp;|&nbsp; Score: ${score}</div>
    <div class="instructions">
      Time: <span style="color:#ff0;font-size:28px">${finishTime.toFixed(2)}s</span><br>
      Best: <span style="color:#0f8">${highScore.toFixed(2)}s</span>
    </div>
    <button onclick="startGame()">RACE AGAIN</button>
  `;
}

let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  ctx.save();
  // Screen shake
  if (screenShake > 0) {
    ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }

  drawTrack();

  if (state !== 'playing') {
    ctx.restore();
    return;
  }

  // ── Tank controls ──
  const accel = 0.35;
  const maxSpd = 10;
  const friction = 0.88;
  const turnSpeed = 0.06;

  if (keys['ArrowUp'] || keys['KeyW']) tank.speed += accel;
  if (keys['ArrowDown'] || keys['KeyS']) tank.speed -= accel * 0.6;
  if (keys['ArrowLeft'] || keys['KeyA']) tank.lane = Math.max(0, tank.lane - 1);
  if (keys['ArrowRight'] || keys['KeyD']) tank.lane = Math.min(LANE_COUNT - 1, tank.lane + 1);
  tank.speed = Math.max(0, Math.min(maxSpd, tank.speed));

  // Touch: drag up/down to accelerate/brake, left/right to switch lane
  if (touchMoveActive) {
    // Not used for now — joystick-style handled below
  }

  // Smooth lane transition
  const targetY = getLaneY(tank.lane);
  tank.y += (targetY - tank.y) * 0.12;

  // Move forward
  tank.trackX += tank.speed;

  // Aim turret toward mouse
  tank.turretAngle = Math.atan2(mouseY - tank.y, mouseX - tank.x);

  // Shoot
  if (keys['Space'] || keys['KeyZ']) shootBullet();
  if (tank.shootCooldown > 0) tank.shootCooldown--;
  if (tank.invincible > 0) tank.invincible--;

  // Auto-shoot while holding
  if (keys['Space']) shootBullet();

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
  }
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
  }

  updateObstacles();
  updateEnemyTanks();
  checkCollisions();
  updateParticles();
  checkLapProgress();

  drawParticles();
  drawObstacles();
  drawEnemyTanks();
  drawBullets();
  drawTank();
  updateHUD();

  ctx.restore();
}

// ─── FINISH OVERLAY ──────────────────────────────────────────────────────────
document.getElementById('overlay').innerHTML = `
  <h1>🎯 TANK RACER</h1>
  <div class="subtitle">Race + Shoot = Win!</div>
  <div class="instructions">
    🕹️ ↑↓ Accelerate / Brake<br>
    ← → Switch Lanes<br>
    🖱️ Mouse — Aim turret<br>
    Space / Z — Fire<br>
    📱 Drag — Move &nbsp; Tap — Shoot<br><br>
    3 Laps &nbsp;|&nbsp; Shoot obstacles &amp; enemy tanks!
  </div>
  <button onclick="startGame()">START RACE</button>
`;

requestAnimationFrame(gameLoop);
</script>
